<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九寨沟客流实时预测系统 - 三模型对比</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .realtime-panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .realtime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .unit {
            font-size: 0.8em;
            opacity: 0.8;
        }

        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .chart-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        #forecastChart {
            width: 100%;
            height: 500px;
        }

        .refresh-info {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏔️ 九寨沟客流实时预测系统</h1>
            <div class="subtitle">Real-time Visitor Prediction - Multi-Model Comparison</div>
            <div class="subtitle" style="font-size: 0.9em; margin-top: 10px; opacity: 0.8;">
                ⚠️ 官网数据每日更新，显示为昨天的客流数据
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <button id="refreshBtn" class="refresh-btn">
                🔄 刷新数据
            </button>
        </div>

        <div id="errorMessage" class="error" style="display: none;"></div>

        <div class="realtime-panel">
            <h2 style="margin-bottom: 20px; color: #333;">📊 实时数据</h2>
            <div class="realtime-grid" id="realtimeGrid">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">📈 未来 7 天客流预测 - 三模型对比</div>
            <div id="forecastChart"></div>
        </div>

        <div class="chart-container">
            <div class="chart-title">🎯 预测准确度 (最近 30 天)</div>
            <div id="accuracyPanel" style="padding: 20px;">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="refresh-info">
            <div>最后更新: <span id="lastUpdate">--</span></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:5001/api/realtime';
        let chart = null;

        // 初始化 ECharts
        function initChart() {
            chart = echarts.init(document.getElementById('forecastChart'));
        }

        // 获取实时数据
        async function fetchRealtimeData() {
            try {
                const response = await fetch(`${API_BASE}/current`);
                const result = await response.json();
                
                if (result.success) {
                    displayRealtimeData(result.data);
                    hideError();
                } else {
                    showError('Failed to fetch realtime data: ' + result.error);
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }

        // 获取预测数据（三模型）
        async function fetchForecastData() {
            try {
                const response = await fetch(`${API_BASE}/forecast?days=7`);
                const result = await response.json();
                
                if (result.success) {
                    displayForecastChart(result.data.models);
                    hideError();
                } else {
                    showError('Failed to fetch forecast: ' + result.error);
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }

        // 获取预测准确度
        async function fetchAccuracy() {
            try {
                const response = await fetch(`${API_BASE}/accuracy?days=30`);
                const result = await response.json();
                
                if (result.success) {
                    displayAccuracy(result.data);
                    hideError();
                } else {
                    showError('Failed to fetch accuracy: ' + result.error);
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }

        // 显示实时数据
        function displayRealtimeData(data) {
            const grid = document.getElementById('realtimeGrid');
            const dateNote = data.note ? `<div style="font-size: 0.7em; opacity: 0.7; margin-top: 5px;">${data.date}</div>` : '';
            
            grid.innerHTML = `
                <div class="stat-card">
                    <div class="label">最新客流</div>
                    <div class="value">${data.visitor_count.toLocaleString()}</div>
                    <div class="unit">人</div>
                    ${dateNote}
                </div>
                <div class="stat-card">
                    <div class="label">当前温度</div>
                    <div class="value">${data.temperature.toFixed(1)}</div>
                    <div class="unit">°C</div>
                </div>
                <div class="stat-card">
                    <div class="label">今日最高温</div>
                    <div class="value">${data.temp_high.toFixed(1)}</div>
                    <div class="unit">°C</div>
                </div>
                <div class="stat-card">
                    <div class="label">今日最低温</div>
                    <div class="value">${data.temp_low.toFixed(1)}</div>
                    <div class="unit">°C</div>
                </div>
                <div class="stat-card">
                    <div class="label">降水量</div>
                    <div class="value">${data.precipitation.toFixed(1)}</div>
                    <div class="unit">mm</div>
                </div>
            `;
        }

        // 显示预测准确度
        function displayAccuracy(data) {
            const panel = document.getElementById('accuracyPanel');
            
            if (data.count === 0) {
                panel.innerHTML = '<div style="text-align: center; color: #999;">暂无足够数据计算准确度</div>';
                return;
            }
            
            panel.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div style="text-align: center;">
                        <div style="font-size: 0.9em; color: #666; margin-bottom: 10px;">平均绝对误差 (MAE)</div>
                        <div style="font-size: 2em; font-weight: bold; color: #667eea;">${data.mae.toFixed(0)}</div>
                        <div style="font-size: 0.8em; color: #999;">人</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 0.9em; color: #666; margin-bottom: 10px;">均方根误差 (RMSE)</div>
                        <div style="font-size: 2em; font-weight: bold; color: #764ba2;">${data.rmse.toFixed(0)}</div>
                        <div style="font-size: 0.8em; color: #999;">人</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 0.9em; color: #666; margin-bottom: 10px;">平均百分比误差 (MAPE)</div>
                        <div style="font-size: 2em; font-weight: bold; color: #ff6b6b;">${data.mape.toFixed(1)}%</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 0.9em; color: #666; margin-bottom: 10px;">评估样本数</div>
                        <div style="font-size: 2em; font-weight: bold; color: #4ecdc4;">${data.count}</div>
                        <div style="font-size: 0.8em; color: #999;">天</div>
                    </div>
                </div>
            `;
        }

        // 显示预测图表（三模型对比）
        function displayForecastChart(models) {
            if (!models.lstm && !models.gru && !models.seq2seq) {
                chart.setOption({
                    title: {
                        text: 'No prediction data available',
                        left: 'center',
                        top: 'center'
                    }
                });
                return;
            }

            // 提取日期（使用第一个可用模型的日期）
            const dates = (models.lstm || models.gru || models.seq2seq).map(f => f.date);
            
            // 构建系列数据
            const series = [];
            
            if (models.lstm) {
                series.push({
                    name: 'LSTM',
                    type: 'line',
                    data: models.lstm.map(f => f.predicted_visitor_count),
                    smooth: true,
                    lineStyle: { width: 3, color: '#ff6b6b' },
                    itemStyle: { color: '#ff6b6b' }
                });
            }
            
            if (models.gru) {
                series.push({
                    name: 'GRU',
                    type: 'line',
                    data: models.gru.map(f => f.predicted_visitor_count),
                    smooth: true,
                    lineStyle: { width: 3, color: '#667eea' },
                    itemStyle: { color: '#667eea' },
                    areaStyle: {
                        color: {
                            type: 'linear',
                            x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: 'rgba(102, 126, 234, 0.3)' },
                                { offset: 1, color: 'rgba(102, 126, 234, 0.05)' }
                            ]
                        }
                    }
                });
            }
            
            if (models.seq2seq) {
                series.push({
                    name: 'Seq2Seq+Attention',
                    type: 'line',
                    data: models.seq2seq.map(f => f.predicted_visitor_count),
                    smooth: true,
                    lineStyle: { width: 3, color: '#4ecdc4' },
                    itemStyle: { color: '#4ecdc4' }
                });
            }

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    }
                },
                legend: {
                    data: series.map(s => s.name),
                    top: 10
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLabel: {
                        rotate: 45
                    }
                },
                yAxis: {
                    type: 'value',
                    name: 'Predicted Visitors',
                    axisLabel: {
                        formatter: '{value}'
                    }
                },
                series: series
            };

            chart.setOption(option);
        }

        // 显示错误
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // 隐藏错误
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        // 更新时间戳
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-CN');
        }

        // 刷新所有数据
        async function refreshAll() {
            await fetchRealtimeData();
            await fetchForecastData();
            await fetchAccuracy();
            updateTimestamp();
        }

        // 初始化
        window.addEventListener('load', async () => {
            initChart();
            await refreshAll();
            
            // 绑定刷新按钮
            document.getElementById('refreshBtn').addEventListener('click', refreshAll);
            
            // 响应式图表
            window.addEventListener('resize', () => {
                chart.resize();
            });
        });
    </script>
</body>
</html>
