<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}九寨沟智慧景区客流预测系统{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />

  {% block page_css %}{% endblock %}
</head>
<body class="uiw-body">
  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg uiw-navbar">
    <div class="container-fluid">
      <a class="navbar-brand uiw-brand" href="/dashboard">
        <i class="fas fa-chart-network"></i>
        <i class="fas fa-brain"></i>
        <span>九寨沟客流预测与风险预警看板</span>
      </a>

      <div class="d-flex align-items-center gap-3">
        <div class="uiw-system-status">
          <span class="uiw-status-dot"></span>
          <span>SYSTEM ONLINE</span>
        </div>
        <a class="btn btn-outline-light btn-sm" href="/legacy" title="回到旧版页面">旧版</a>
      </div>
    </div>
  </nav>

  <div class="uiw-layout">
    <!-- Sidebar -->
    <aside class="uiw-sidebar">
      <div class="uiw-sidebar-title">导航</div>
      <a class="uiw-nav-item" href="/dashboard"><i class="fa-solid fa-gauge-high"></i><span>仪表盘</span></a>
      <a class="uiw-nav-item" href="/compare"><i class="fa-solid fa-code-compare"></i><span>模型对比</span></a>
      <a class="uiw-nav-item" href="/definitions"><i class="fa-solid fa-book"></i><span>指标定义</span></a>
      <a class="uiw-nav-item" href="/explain"><i class="fa-solid fa-circle-info"></i><span>解释说明</span></a>

      <div class="uiw-sidebar-footnote">
        <div class="text-white-50">Offline artifact mode</div>
        <div class="text-white-50" style="font-family: 'Roboto Mono', monospace;">/api/models • /api/forecast</div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="uiw-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  {% block page_js %}{% endblock %}
</body>
</html>
