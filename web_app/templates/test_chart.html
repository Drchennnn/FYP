{% extends 'base.html' %}

{% block title %}Test: Chart Interactions{% endblock %}

{% block content %}
<div class="container py-3" style="max-width: 980px;">
  <h2 class="mb-3">/test/chart</h2>

  <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
    <div class="btn-group" role="group" aria-label="data source">
      <button class="btn btn-sm btn-outline-primary" id="btnSourceMock" type="button">Mock</button>
      <button class="btn btn-sm btn-outline-primary" id="btnSourceApi" type="button">API</button>
    </div>

    <div class="ms-2">
      <span class="text-white-50">Selected date:</span>
      <span id="selectedDate" style="font-family: 'Roboto Mono', monospace;">(none)</span>
    </div>
  </div>

  <div id="chart" style="height: 420px; width: 100%; border: 1px solid rgba(255,255,255,0.12);"></div>

  <div class="mt-3 text-white-50" style="font-size: 12px;">
    Tips: hover points for tooltip; click a point to update the selected date label.
  </div>
</div>
{% endblock %}

{% block page_js %}
<script src="{{ url_for('static', filename='js/test_shared.js') }}"></script>
<script src="{{ url_for('static', filename='js/test_chart.js') }}"></script>
{% endblock %}
