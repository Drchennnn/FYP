{% extends 'base.html' %}

{% block title %}Test: Weather Card{% endblock %}

{% block content %}
<div class="container py-3" style="max-width: 980px;">
  <h2 class="mb-3">/test/weather</h2>

  <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
    <div class="btn-group" role="group" aria-label="data source">
      <button class="btn btn-sm btn-outline-primary" id="btnSourceMock" type="button">Mock</button>
      <button class="btn btn-sm btn-outline-primary" id="btnSourceApi" type="button">API</button>
    </div>

    <div class="ms-2 d-flex align-items-center gap-2">
      <label class="text-white-50" for="datePicker">Date:</label>
      <input class="form-control form-control-sm" id="datePicker" type="date" style="width: 170px;" />
    </div>
  </div>

  <!-- Minimal uiw-weather-card structure (no styling focus) -->
  <div class="uiw-weather-card" style="border: 1px solid rgba(255,255,255,0.12); padding: 12px;">
    <div class="uiw-weather-card__header d-flex justify-content-between align-items-center">
      <div>
        <div class="uiw-weather-card__title" id="wTitle" style="font-weight: 600;">Weather</div>
        <div class="uiw-weather-card__subtitle text-white-50" id="wSubtitle" style="font-size: 12px;">(select a date)</div>
      </div>
      <div class="uiw-weather-card__badge" id="wCode" style="font-family: 'Roboto Mono', monospace;">--</div>
    </div>

    <div class="uiw-weather-card__body mt-3">
      <div class="uiw-weather-row" id="rowTempHigh">
        <span class="text-white-50">Temp high (°C):</span>
        <span id="wTempHigh" class="ms-2">--</span>
      </div>
      <div class="uiw-weather-row" id="rowTempLow">
        <span class="text-white-50">Temp low (°C):</span>
        <span id="wTempLow" class="ms-2">--</span>
      </div>
      <div class="uiw-weather-row" id="rowPrecip">
        <span class="text-white-50">Precip (mm):</span>
        <span id="wPrecip" class="ms-2">--</span>
      </div>
      <div class="uiw-weather-row" id="rowWind">
        <span class="text-white-50">Wind:</span>
        <span id="wWind" class="ms-2">--</span>
      </div>
      <div class="uiw-weather-row" id="rowAqi">
        <span class="text-white-50">AQI:</span>
        <span id="wAqi" class="ms-2">--</span>
      </div>
    </div>
  </div>

  <div class="mt-3 text-white-50" style="font-size: 12px;">
    Missing fields should hide their rows.
  </div>
</div>
{% endblock %}

{% block page_js %}
<script src="{{ url_for('static', filename='js/test_shared.js') }}"></script>
<script src="{{ url_for('static', filename='js/test_weather.js') }}"></script>
{% endblock %}
